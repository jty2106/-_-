const palette = {
  "전용주거":"#fef9c3",
  "일반주거_저밀(1종)":"#fef08a",
  "일반주거_중밀(2종)":"#facc15",
  "일반주거_고밀(3종)":"#eab308",
  "준주거":"#ca8a04",
  "근린·유통상업":"#ef4444",
  "중심·일반상업":"#f87171",
  "일반·준공업":"#c084fc",
  "보전·자연녹지":"#86efac",
  "생산녹지":"#22c55e",
  "도시지역_세부미지정":"#e5e7eb",
  "미지정":"#9ca3af"
};

let map, blockLayer, chart;

function fmt(n) { return Math.round(Number(n || 0)).toLocaleString(); }
function getKey(f) { return (f.properties && f.properties.major_lu) || "미지정"; }
function getColor(f) { return palette[getKey(f)] || palette["미지정"]; }
function getArea(f) { return Number((f.properties && f.properties.area_m2) || 0); }

const songpaBounds = [[37.460, 127.070], [37.545, 127.170]];

function initMap() {
  map = L.map('map', { zoomControl:false, attributionControl:true, maxBounds: songpaBounds, maxBoundsViscosity: 0.8 }).fitBounds(songpaBounds);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'&copy; OpenStreetMap contributors' }).addTo(map);
}

function renderLayer() {
  if (blockLayer) blockLayer.remove();
  const opacity = Number(document.getElementById('opacity').value) / 100;
  blockLayer = L.geoJSON(landUseData, {
    style: f => ({ color:'#111827', weight:0.5, fillColor:getColor(f), fillOpacity:opacity, opacity:Math.min(opacity + .15, 1) }),
    onEachFeature: (f, layer) => {
      const p = f.properties || {};
      layer.bindPopup(`
        <b>블록 ID</b>: ${p.block_id ?? ''}<br>
        <b>주력 용도지역</b>: ${p.major_lu || '미지정'}<br>
        <b>면적</b>: ${fmt(p.area_m2)}㎡<br>
        <b>주력 비중</b>: ${Number(p.major_share || 0).toFixed(2)}<br>
        <b>건축가능 비율</b>: ${Number(p.buildable_share || 0).toFixed(2)}<br>
        <b>도로 비중</b>: ${Number(p.road_share || 0).toFixed(2)}
      `);
    }
  });
  if (document.getElementById('chkBlocks').checked) blockLayer.addTo(map);
  map.fitBounds(songpaBounds, {padding:[20,20]});
}

function calculateStats() {
  const stats = {};
  let total = 0;
  landUseData.features.forEach(f => {
    const key = getKey(f);
    const area = getArea(f);
    if (!stats[key]) stats[key] = {count:0, area:0, color: palette[key] || palette['미지정']};
    stats[key].count += 1;
    stats[key].area += area;
    total += area;
  });
  return {stats, total};
}

function renderStats() {
  const {stats, total} = calculateStats();
  const entries = Object.entries(stats).sort((a,b)=>b[1].area-a[1].area);
  document.getElementById('statsBody').innerHTML = entries.map(([name, s]) => `
    <tr><td>${name}</td><td class="num">${s.count.toLocaleString()}</td><td class="num">${fmt(s.area)}</td><td class="num">${total ? (s.area/total*100).toFixed(1) : '0.0'}%</td></tr>
  `).join('') + `
    <tr style="font-weight:800"><td>합계</td><td class="num">${landUseData.features.length.toLocaleString()}</td><td class="num">${fmt(total)}</td><td class="num">100.0%</td></tr>`;
  document.getElementById('summary').textContent = `총 ${landUseData.features.length.toLocaleString()}개 블록, 총 면적 ${fmt(total)}㎡`;
  document.getElementById('legend').innerHTML = entries.map(([name, s]) => `<div class="legend-item"><span class="swatch" style="background:${s.color}"></span><span>${name}</span></div>`).join('');
  const top = entries.slice(0, 8);
  const ctx = document.getElementById('pieChart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type:'doughnut',
    data:{ labels: top.map(x=>x[0]), datasets:[{ data:top.map(x=>x[1].area), backgroundColor:top.map(x=>x[1].color), borderWidth:1 }] },
    options:{ responsive:true, plugins:{ legend:{ display:false } } }
  });
}

function init() {
  initMap();
  renderLayer();
  renderStats();
  document.getElementById('chkBlocks').addEventListener('change', () => { if (document.getElementById('chkBlocks').checked) blockLayer.addTo(map); else blockLayer.remove(); });
  document.getElementById('opacity').addEventListener('input', renderLayer);
}

window.addEventListener('load', init);
</script>
